name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$HOME/.cyrius/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/sit
          echo "sit: $(wc -c < build/sit) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/sit | grep -q "7f45 4c46"

      - name: Test
        run: cyrius test tests/sit.tcyr

      - name: Smoke — init + add + commit + log
        run: |
          export HOME=$GITHUB_WORKSPACE/ci-home
          mkdir -p "$HOME"
          demo=$(mktemp -d)
          cd "$demo"
          export SIT_AUTHOR_NAME="CI Runner"
          export SIT_AUTHOR_EMAIL="ci@example.com"
          "$GITHUB_WORKSPACE/build/sit" init
          echo "hello, sit!" > greeting.txt
          "$GITHUB_WORKSPACE/build/sit" add greeting.txt
          "$GITHUB_WORKSPACE/build/sit" commit -m "smoke commit"
          "$GITHUB_WORKSPACE/build/sit" log | head -5
          "$GITHUB_WORKSPACE/build/sit" fsck

      - name: Smoke — signed commit roundtrip
        run: |
          export HOME=$GITHUB_WORKSPACE/ci-home
          demo=$(mktemp -d)
          cd "$demo"
          export SIT_AUTHOR_NAME="CI Runner"
          export SIT_AUTHOR_EMAIL="ci@example.com"
          "$GITHUB_WORKSPACE/build/sit" key generate
          "$GITHUB_WORKSPACE/build/sit" init
          echo "signed" > a.txt
          "$GITHUB_WORKSPACE/build/sit" add a.txt
          "$GITHUB_WORKSPACE/build/sit" commit -S -m "signed smoke"
          "$GITHUB_WORKSPACE/build/sit" verify-commit

      - name: Smoke — wire protocol (clone, pull, push)
        run: |
          export HOME=$GITHUB_WORKSPACE/ci-home
          export SIT_AUTHOR_NAME="CI Runner"
          export SIT_AUTHOR_EMAIL="ci@example.com"
          ORIG=$(mktemp -d)
          (cd "$ORIG" && "$GITHUB_WORKSPACE/build/sit" init && echo hello > a && "$GITHUB_WORKSPACE/build/sit" add a && "$GITHUB_WORKSPACE/build/sit" commit -m "origin-root")
          CLONE=$(mktemp -d)/repo
          "$GITHUB_WORKSPACE/build/sit" clone "$ORIG" "$CLONE"
          cd "$CLONE"
          test "$(cat a)" = "hello" || { echo "clone content wrong"; exit 1; }
          echo world > b
          "$GITHUB_WORKSPACE/build/sit" add b
          "$GITHUB_WORKSPACE/build/sit" commit -m "clone-add-b"
          "$GITHUB_WORKSPACE/build/sit" push origin main
          # Verify origin received the push
          cd "$ORIG"
          test -f b && grep -q world b && echo "wire smoke ok" || { echo "push content missing"; exit 1; }

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (cyrius.cyml pulls VERSION via \${file:VERSION})"
